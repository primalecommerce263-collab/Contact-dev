<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Contact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f7;
            padding: 20px;
        }

        .card {
            max-width: 400px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 32px 36px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        .message {
            font-size: 16px;
            color: #1c1c1e;
            line-height: 1.6;
            margin-bottom: 8px;
            font-weight: 400;
        }

        .sub-message {
            font-size: 15px;
            color: #8e8e93;
            line-height: 1.6;
            margin-bottom: 32px;
            font-weight: 400;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            color: #1c1c1e;
            background: #f5f5f7;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn .icon {
            font-size: 20px;
            line-height: 1;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .btn .label {
            flex: 1;
            text-align: left;
        }

        .btn .arrow {
            color: #8e8e93;
            font-size: 14px;
        }

        .btn-whatsapp {
            background: #e8f5ee;
            border-color: rgba(37, 211, 102, 0.3);
        }
        .btn-whatsapp:hover {
            background: #d4ede3;
            border-color: #25d366;
        }

        .btn-telegram {
            background: #e8f2f8;
            border-color: rgba(0, 136, 204, 0.15);
        }
        .btn-telegram:hover {
            background: #d4e6f0;
            border-color: #0088cc;
        }

        @media (max-width: 440px) {
            .card {
                padding: 32px 20px 28px;
                border-radius: 20px;
            }
            .message {
                font-size: 15px;
            }
            .sub-message {
                font-size: 14px;
            }
            .btn {
                padding: 14px 16px;
                font-size: 15px;
                border-radius: 12px;
            }
            .btn .icon {
                font-size: 18px;
                width: 22px;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 24px 16px 20px;
            }
            .message {
                font-size: 14px;
            }
            .sub-message {
                font-size: 13px;
            }
            .btn {
                padding: 12px 14px;
                font-size: 14px;
                border-radius: 10px;
            }
            .btn .icon {
                font-size: 16px;
                width: 20px;
            }
        }

        @supports (padding: max(0px)) {
            .card {
                padding-left: max(32px, env(safe-area-inset-left));
                padding-right: max(32px, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>

<div class="card">

    <p class="message">
        The quickest way to reach me is via WhatsApp.
    </p>
    <p class="sub-message">
        Kindly choose any preferred communication channel.
    </p>

    <div class="btn-group">

        <!-- Telegram -->
        <a href="https://telegram.me/primalux0"
           target="_blank"
           rel="noopener noreferrer"
           class="btn btn-telegram">
            <span class="icon">✈️</span>
            <span class="label">Telegram</span>
            <span class="arrow">→</span>
        </a>

        <!-- WhatsApp -->
        <a href="https://wa.link/5p2aaz"
           target="_blank"
           rel="noopener noreferrer"
           class="btn btn-whatsapp">
            <span class="icon">💬</span>
            <span class="label">WhatsApp</span>
            <span class="arrow">→</span>
        </a>

    </div>

</div>

</body>
</html>
