<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Contact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f7;
            padding: 20px;
        }

        .card {
            max-width: 400px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            padding: 48px 32px 40px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #e8e8ed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            color: #1c1c1e;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .subtitle {
            font-size: 15px;
            color: #8e8e93;
            font-weight: 400;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            color: #1c1c1e;
            background: #f5f5f7;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn .icon {
            font-size: 20px;
            line-height: 1;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .btn .label {
            flex: 1;
            text-align: left;
        }

        .btn .arrow {
            color: #8e8e93;
            font-size: 14px;
        }

        .btn-whatsapp {
            background: #e8f5ee;
            border-color: rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            background: #d4ede3;
            border-color: #25d366;
        }

        .footer {
            margin-top: 28px;
            color: #c7c7cc;
            font-size: 12px;
            letter-spacing: 0.2px;
        }

        @media (max-width: 440px) {
            .card {
                padding: 36px 20px 32px;
                border-radius: 20px;
            }
            .avatar {
                width: 64px;
                height: 64px;
                font-size: 28px;
            }
            .title {
                font-size: 18px;
            }
            .subtitle {
                font-size: 14px;
            }
            .btn {
                padding: 14px 16px;
                font-size: 15px;
                border-radius: 12px;
            }
            .btn .icon {
                font-size: 18px;
                width: 22px;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 28px 16px 24px;
            }
            .btn {
                padding: 12px 14px;
                font-size: 14px;
                border-radius: 10px;
            }
            .btn .icon {
                font-size: 16px;
                width: 20px;
            }
        }

        @supports (padding: max(0px)) {
            .card {
                padding-left: max(32px, env(safe-area-inset-left));
                padding-right: max(32px, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>

<div class="card">

    <div class="avatar">👤</div>

    <h1 class="title">Contact</h1>
    <p class="subtitle">Kindly message me on WhatsApp.</p>

    <div class="btn-group">
        <a href="https://wa.link/6ytd0t"
           target="_blank"
           rel="noopener noreferrer"
           class="btn btn-whatsapp">
            <span class="icon">💬</span>
            <span class="label">WhatsApp</span>
            <span class="arrow">→</span>
        </a>
    </div>

    <div class="footer">—</div>

</div>

</body>
</html>
